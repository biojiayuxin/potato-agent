    - discord
    - discord_admin
    - yuanbao
    - feishu_doc
    - feishu_drive
    - spotify

expected_tools:
  - terminal
  - process
  - read_file
  - write_file
  - patch
  - search_files
  - vision_analyze
  - browser_navigate
  - browser_snapshot
  - browser_click
  - browser_type
  - browser_scroll
  - browser_back
  - browser_press
  - browser_get_images
  - browser_vision
  - browser_console
