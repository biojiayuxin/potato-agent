  - session_search
  - delegate_task

plugins:
  allow_user: false
  allow_project: false
  allow_entrypoint: false
  allowed_general_keys: []
  forbidden_kinds:
    - platform

providers:
  model:
    - custom
  api_modes:
    - codex_responses
    - chat_completions
  browser: local
  memory: builtin
  context_engine: compressor
  web: []

mcp:
  enabled: false

runtime:
  allow_lazy_installs: false
  lsp_enabled: true
  lsp_install_strategy: manual
  terminal_backend: local
  skills_dependency_strategy: user_managed
