start_port: 8643
hermes:
  executable: /usr/local/bin/hermes
  api_server_host: 127.0.0.1
  api_server_model_name: Hermes
  config_overrides:
    agent:
      reasoning_effort: high
  terminal:
    backend: local
    timeout: 180
  model:
    default: gpt-5.4
    provider: custom
    base_url: https://tokenx24.com/v1
    api_key: ${POTATO_AGENT_SHARED_API_KEY}
  extra_env:
    OPENAI_API_KEY: ${POTATO_AGENT_SHARED_API_KEY}
open_webui:
  connection_type: external
  wrapper_owner_user_id: ce9052db-99f1-4266-9fa7-1044da7c11f0
  wrapper_description_template: Private Hermes wrapper for {target_label}
  default_tags:
  - hermes
  - isolated
  - private
  wrapper_meta_defaults:
    profile_image_url: /static/favicon.png
    tags:
    - name: hermes
    - name: isolated
  wrapper_params_defaults: {}
users:
- username: user_test
  webui_user: user_test@example.com
  webui_display_name: user_test
  openwebui_user_id: 342f9bf2-7cda-4408-8124-bff02a4f6ed7
  linux_user: hmx_user_test
  home_dir: /home/hmx_user_test
  hermes_home: /home/hmx_user_test/.hermes
  workdir: /home/hmx_user_test/work
  api_port: 8643
  api_key: ${POTATO_AGENT_SHARED_API_KEY}
  api_server_model_name: Hermes
  connection_prefix: hermes-user-test
  model_id: hermes-user-test
  model_name: Hermes
  systemd_service: hermes-user-test.service
  openwebui_tags:
  - user_test
- username: user1
  linux_user: hmx_user1
  home_dir: /home/hmx_user1
  hermes_home: /home/hmx_user1/.hermes
  workdir: /home/hmx_user1/work
  api_port: 8644
  api_server_model_name: Hermes
  connection_prefix: hermes-user1
  model_id: hermes-user1
  model_name: Hermes
  systemd_service: hermes-user1.service
  openwebui_tags:
  - user1
  webui_user: user1@example.com
  webui_display_name: user1
  openwebui_user_id: eeb621e9-a8b4-4b1a-9326-b5bfa242085e
  api_key: ${POTATO_AGENT_SHARED_API_KEY}
