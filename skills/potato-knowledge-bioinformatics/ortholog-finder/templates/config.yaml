# Ortholog Finder configuration
# Use relative paths, user-provided paths, or shared public_data paths.

env_prefix: ""
scripts_dir: "scripts"

species:
  a:
    prefix: "genomeA"
    label: "Genome A"
    gff3: "data/genomeA.gff3"
    fasta: "data/genomeA.pep.fa"
    gff_type: "mRNA"
    gff_key: "ID"

  b:
    prefix: "genomeB"
    label: "Genome B"
    gff3: "data/genomeB.gff3"
    fasta: "data/genomeB.pep.fa"
    gff_type: "mRNA"
    gff_key: "ID"

mcscan:
  dbtype: "prot"       # "prot" uses .pep links; "nucl" uses .cds links
  align_soft: "last"
  cscore: 0.7
  cpus: 16
  no_strip_names: true
  no_dotplot: true

id_check:
  fail_on_fasta_extra: false

gene_id:
  gene_type: "gene"
  transcript_types: ["mRNA", "transcript"]
  gene_id_key: "ID"
  transcript_id_key: "ID"
  parent_key: "Parent"

anchor_mapping:
  # Use .anchors as the primary synteny source unless use_lifted is true.
  use_lifted: false
  synteny_label: "synteny"
  fallback_enabled: true
  fallback_label: ""
  fallback_min_identity: 90.0
  allow_containment_match: true

no_suffix:
  enabled: true
  output: "results/final_mapped_gene_anchor.no_suffix.txt"
  column: 2
  mode: "numeric_suffix"   # "numeric_suffix", "rsplit", or "none"
  regex: "\\.[0-9]+$"
