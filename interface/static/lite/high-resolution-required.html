<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>High-resolution device required</title>
    <link rel="icon" type="image/png" href="../favicon.png" />
    <link rel="stylesheet" href="./styles.css?v=20260709-index-document-scroll" />
  </head>
  <body>
    <div class="app-shell">
      <section class="login-view high-resolution-view">
        <header class="portal-header">
          <section class="portal-hero" aria-labelledby="portal-title">
            <div class="portal-hero-content">
              <h1 id="portal-title">AI-powered multi-omics database for potato research</h1>
            </div>
          </section>
          <nav class="portal-nav" aria-label="Portal modules">
            <a class="portal-nav-item active" href="/lite" aria-current="page">Potato Agent</a>
            <button id="portal-nav-toggle" class="portal-nav-toggle" type="button" aria-label="Open module navigation" aria-expanded="false" title="Modules">
              <span class="portal-nav-toggle-bar"></span>
              <span class="portal-nav-toggle-bar"></span>
              <span class="portal-nav-toggle-bar"></span>
            </button>
            <a class="portal-nav-item" href="./high-resolution-required.html">Spatial Expression</a>
            <a class="portal-nav-item" href="./high-resolution-required.html">WGCNA Network</a>
            <a class="portal-nav-item" href="./high-resolution-required.html">Bulk RNA-Seq</a>
            <a class="portal-nav-item" href="./high-resolution-required.html" aria-disabled="true" tabindex="-1">Genome Browser</a>
            <a class="portal-nav-item" href="./high-resolution-required.html" aria-disabled="true" tabindex="-1">Variants</a>
            <a class="portal-nav-item" href="./high-resolution-required.html" aria-disabled="true" tabindex="-1">Germplasm</a>
          </nav>
        </header>

        <div class="login-stage">
          <div class="login-card-shell">
            <section class="login-card high-resolution-card" aria-labelledby="high-resolution-title">
              <div class="login-card-header high-resolution-message">
                <div class="login-card-label">Display</div>
                <h2 id="high-resolution-title">High-resolution device required</h2>
                <p class="muted">For a better display experience, please use a high-resolution device.</p>
                <a class="primary high-resolution-return" href="/lite">Back to Potato Agent</a>
              </div>
            </section>
          </div>
        </div>
      </section>
    </div>

    <script>
      const nav = document.querySelector('.portal-nav');
      const toggle = document.getElementById('portal-nav-toggle');
      toggle?.addEventListener('click', () => {
        const expanded = !nav?.classList.contains('expanded');
        nav?.classList.toggle('expanded', expanded);
        toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
        toggle.setAttribute('aria-label', expanded ? 'Close module navigation' : 'Open module navigation');
      });
    </script>
  </body>
</html>
