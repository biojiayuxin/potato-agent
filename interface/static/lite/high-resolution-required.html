<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>High-resolution device required</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
        color: #14213d;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      p {
        max-width: 520px;
        margin: 0;
        text-align: center;
        font-size: 18px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <p>For a better display experience, please use a high-resolution device.</p>
  </body>
</html>
