<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Potato Agent Lite</title>
    <link rel="stylesheet" href="/static/lite/styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <section id="login-view" class="login-view">
        <div class="login-card">
          <div class="brand">Potato Agent Lite</div>
          <h1>登录</h1>
          <p class="muted">使用 Open WebUI 账号登录，进入轻量聊天工作台。</p>
          <form id="login-form" class="stack gap-12">
            <label class="stack gap-6">
              <span>邮箱</span>
              <input id="email" name="email" type="email" autocomplete="username" required />
            </label>
            <label class="stack gap-6">
              <span>密码</span>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </label>
            <button type="submit" class="primary">登录</button>
            <div id="login-error" class="error" hidden></div>
          </form>
        </div>
      </section>

      <section id="workspace-view" class="workspace-view" hidden>
        <aside class="sidebar">
          <div class="sidebar-header">
            <div>
              <div class="brand small">Potato Agent Lite</div>
              <div id="user-email" class="muted tiny"></div>
            </div>
            <button id="logout-button" class="ghost small">退出</button>
          </div>

          <div class="sidebar-actions">
            <button id="new-chat-button" class="primary small stretch">新建聊天</button>
          </div>

          <div class="sidebar-section-title">聊天列表</div>
          <div id="chat-list" class="chat-list"></div>
        </aside>

        <div id="sidebar-resizer" class="panel-resizer" aria-hidden="true"></div>

        <main class="main-panel">
          <header class="topbar">
            <div>
              <h1 id="chat-title">新聊天</h1>
              <div id="model-name" class="muted tiny"></div>
            </div>
            <div class="topbar-actions">
              <label class="theme-select-wrap" for="theme-select">
                <span class="tiny muted">主题</span>
                <select id="theme-select" class="theme-select" aria-label="切换主题">
                  <option value="system">跟随系统</option>
                  <option value="light">浅色</option>
                  <option value="dark">深色</option>
                </select>
              </label>
            </div>
          </header>

          <div class="content-grid">
            <section class="chat-panel">
              <div id="messages" class="messages"></div>
              <form id="composer-form" class="composer">
                <div class="composer-actions">
                  <div id="chat-error" class="error" hidden></div>
                  <div class="composer-input-wrap">
                    <textarea
                      id="prompt-input"
                      rows="1"
                      placeholder="输入消息，按 Enter 发送，Ctrl/Cmd + Enter 或 Shift + Enter 换行"
                    ></textarea>
                    <button id="send-button" type="submit" class="composer-icon-button" aria-label="发送消息" title="发送消息">
                      <img id="send-button-icon" src="/static/lite/icons/send.png" alt="" class="composer-icon" />
                    </button>
                  </div>
                </div>
              </form>
            </section>

            <div id="files-resizer" class="panel-resizer inner" aria-hidden="true"></div>

            <aside class="files-panel">
              <div class="files-header">
                <div>
                  <div class="sidebar-section-title no-margin">文件浏览</div>
                  <div id="cwd-label" class="muted tiny"></div>
                </div>
                <button id="refresh-files-button" class="ghost small">刷新</button>
              </div>
              <div id="file-tree" class="file-tree"></div>
            </aside>
          </div>
        </main>
      </section>
    </div>

    <template id="chat-item-template">
      <div class="chat-item-shell">
        <button class="chat-item">
          <span class="chat-item-title"></span>
          <span class="chat-item-meta"></span>
        </button>
        <div class="chat-item-actions">
          <button type="button" class="chat-delete-button" aria-label="删除聊天" title="删除聊天">
            <img src="/static/lite/icons/delete.png" alt="" class="chat-delete-icon" />
          </button>
        </div>
      </div>
    </template>

    <template id="message-template">
      <article class="message">
        <div class="message-role"></div>
        <div class="message-meta-sections"></div>
        <div class="message-content"></div>
        <div class="message-streaming-indicator" hidden>
          <span></span><span></span><span></span>
        </div>
        <div class="message-actions">
          <button type="button" class="message-copy-button" aria-label="复制消息" title="复制消息">
            <img src="/static/lite/icons/copy_button.png" alt="" class="message-copy-icon" />
          </button>
        </div>
      </article>
    </template>

    <script src="/static/lite/vendor/marked.umd.js"></script>
    <script type="module" src="/static/lite/app.js"></script>
  </body>
</html>
