# Unified source of truth for the Linux-user-based Hermes + Open WebUI setup.
#
# This file is consumed by:
# - ./generate_multiuser_bundle.py
# - hermes-agent/scripts/generate_openwebui_multiuser.py --mapping ...
#
# Design notes:
# - Every Open WebUI user maps to a dedicated Linux account.
# - Every Hermes instance runs under that Linux account via systemd.
# - Hermes keeps advertising the base model name `Hermes`.
# - Open WebUI must set a unique `prefix_id` per connection, otherwise multiple
#   Hermes connections would collapse into one base model entry.
# - User-facing isolation is completed by wrapper models with unique `model_id`
#   values and the shared display name `Hermes`.
# - `${ENV_NAME}` placeholders are resolved from the current shell environment
#   when bundle/provision scripts run.

start_port: 8643

hermes:
  executable: /usr/local/bin/hermes
  api_server_host: 127.0.0.1
  api_server_model_name: Hermes
  config_overrides:
    agent:
      reasoning_effort: high
  terminal:
    backend: local
    timeout: 180
  model:
    default: gpt-5.4
    provider: custom
    base_url: https://your-upstream-model-gateway.example/v1
    api_key: ${POTATO_AGENT_SHARED_API_KEY}
  extra_env:
    OPENAI_API_KEY: ${POTATO_AGENT_SHARED_API_KEY}

open_webui:
  connection_type: external
  wrapper_owner_user_id: system
  wrapper_description_template: Private Hermes wrapper for {target_label}
  default_tags:
    - hermes
    - isolated
    - private
  wrapper_meta_defaults:
    profile_image_url: /static/favicon.png
    tags:
      - name: hermes
      - name: isolated
  wrapper_params_defaults: {}

users:
  - username: alice
    webui_user: alice@example.com
    webui_display_name: Alice
    openwebui_user_id: user_alice
    linux_user: hmx_alice
    home_dir: /home/hmx_alice
    hermes_home: /home/hmx_alice/.hermes
    workdir: /home/hmx_alice/work
    api_port: 8643
    api_key: ${POTATO_AGENT_SHARED_API_KEY}
    api_server_model_name: Hermes
    connection_prefix: hermes-alice
    model_id: hermes-alice
    model_name: Hermes
    systemd_service: hermes-alice.service

  - username: bob
    webui_user: bob@example.com
    webui_display_name: Bob
    openwebui_user_id: user_bob
    linux_user: hmx_bob
    home_dir: /home/hmx_bob
    hermes_home: /home/hmx_bob/.hermes
    workdir: /home/hmx_bob/work
    api_port: 8644
    api_key: ${POTATO_AGENT_SHARED_API_KEY}
    api_server_model_name: Hermes
    connection_prefix: hermes-bob
    model_id: hermes-bob
    model_name: Hermes
    systemd_service: hermes-bob.service
